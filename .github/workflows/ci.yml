name: CI
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get CMake
        uses: lukka/get-cmake@v3.29.0

      # --- Install Python for aqtinstall ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use a recent Python 3

      - name: Install aqtinstall
        run: pip install aqtinstall

      # --- Install Qt6 using aqtinstall ---
      - name: Install Qt6 (Linux)
        if: runner.os == 'Linux'
        run: aqt install-qt linux desktop 6.5.3 linux-64 -m qtbase qttools qtdeclarative

      - name: Install Qt6 (macOS)
        if: runner.os == 'macOS'
        run: aqt install-qt mac desktop 6.5.3 macos-universal -m qtbase qttools qtdeclarative
        # For Apple Silicon (macos-14), macos-universal should work.
        # If specific arm64 build is needed and available: macos-arm64

      - name: Install Qt6 (Windows)
        if: runner.os == 'Windows'
        run: aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 -m qtbase qttools qtdeclarative

      # --- Add Qt to PATH/CMAKE_PREFIX_PATH ---
      # aqtinstall installs Qt in $HOME/Qt or C:/Qt by default.
      # The path components (gcc_64, macos, msvc2019_64) depend on aqt's naming for the specific Qt version and target.
      
      - name: Add Qt to PATH (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "$HOME/Qt/6.5.3/gcc_64/bin" >> $GITHUB_PATH
          echo "QT_DIR_CMAKE=$HOME/Qt/6.5.3/gcc_64/lib/cmake" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.5.3/gcc_64:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
          # For some Linux setups, also setting LD_LIBRARY_PATH might be needed for runtime
          echo "$HOME/Qt/6.5.3/gcc_64/lib" >> $GITHUB_LD_LIBRARY_PATH

      - name: Add Qt to PATH (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "$HOME/Qt/6.5.3/macos/bin" >> $GITHUB_PATH
          echo "QT_DIR_CMAKE=$HOME/Qt/6.5.3/macos/lib/cmake" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/6.5.3/macos:$CMAKE_PREFIX_PATH" >> $GITHUB_ENV
          # For macOS, DYLD_LIBRARY_PATH is the equivalent of LD_LIBRARY_PATH
          echo "$HOME/Qt/6.5.3/macos/lib" >> $GITHUB_DYLD_LIBRARY_PATH
          
      - name: Add Qt to PATH (Windows)
        if: runner.os == 'Windows'
        # Using PowerShell syntax for GITHUB_PATH and GITHUB_ENV on Windows
        run: |
          echo "C:\Qt\6.5.3\msvc2019_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "QT_DIR_CMAKE=C:\Qt\6.5.3\msvc2019_64\lib\cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_PREFIX_PATH=C:\Qt\6.5.3\msvc2019_64;${env:CMAKE_PREFIX_PATH}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # For Windows, PATH is usually sufficient for runtime DLLs if they are in the same dir or system PATH

      - name: Configure CMake
        # CMAKE_PREFIX_PATH should be set from the previous steps via GITHUB_ENV
        # Qt6_DIR can also be set to QT_DIR_CMAKE for more direct hinting if needed.
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DQt6_DIR=${{ env.QT_DIR_CMAKE }}

      - name: Build project
        run: cmake --build build --parallel

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload Build Artifact (Optional)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: backy_x-${{ matrix.os }}-build-output
          path: |
            build/
          retention-days: 7
